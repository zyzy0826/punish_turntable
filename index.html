<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>懲罰轉盤</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet" />
  <style>
    :root {
      --stone:       #8B8B8B;
      --stone-light: #C6C6C6;
      --stone-dark:  #373737;
      --bg:          #1D1D1D;
      --gold:        #FCBA03;
      --xp-green:    #80FF20;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* 石頭方格背景 */
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(0deg,   transparent 0px, transparent 31px, rgba(0,0,0,0.22) 31px, rgba(0,0,0,0.22) 32px),
        repeating-linear-gradient(90deg,  transparent 0px, transparent 31px, rgba(0,0,0,0.22) 31px, rgba(0,0,0,0.22) 32px);
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      gap: 28px;
    }

    /* 標題區 */
    .title-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; }

    h1 {
      font-size: 1.4rem;
      text-shadow: 3px 3px 0 #3f3f3f;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    /* 草地裝飾條 */
    .strip-grass {
      width: 340px; height: 10px;
      background: repeating-linear-gradient(90deg, #5D7C15 0px, #5D7C15 7px, #4A6612 7px, #4A6612 8px);
    }
    .strip-dirt {
      width: 340px; height: 8px;
      background: repeating-linear-gradient(90deg, #866043 0px, #866043 7px, #6B4C33 7px, #6B4C33 8px);
    }

    /* 轉盤 */
    .wheel-wrapper {
      position: relative;
      width: 420px;
      height: 420px;
      cursor: pointer;
    }

    /* 方塊風格外框 */
    .wheel-border {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 8px solid #000;
      box-shadow: 0 0 0 2px #555, 4px 4px 0 2px #000;
      pointer-events: none;
    }

    canvas#wheel { border-radius: 50%; display: block; }

    /* 指針 */
    .pointer {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 34px solid #CC0000;
      filter: drop-shadow(2px 2px 0 #000);
      z-index: 2;
      pointer-events: none;
    }

    /* Minecraft 按鈕 */
    .mc-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.85rem;
      letter-spacing: 1px;
      padding: 12px 44px;
      min-width: 200px;
      background: var(--stone);
      color: #fff;
      text-shadow: 2px 2px 0 #3f3f3f;
      border: none;
      cursor: pointer;
      border-top:    4px solid var(--stone-light);
      border-left:   4px solid var(--stone-light);
      border-bottom: 4px solid var(--stone-dark);
      border-right:  4px solid var(--stone-dark);
      transition: filter 0.05s;
    }

    .mc-btn:hover   { filter: brightness(1.18); }
    .mc-btn:active  {
      border-top:    4px solid var(--stone-dark);
      border-left:   4px solid var(--stone-dark);
      border-bottom: 4px solid var(--stone-light);
      border-right:  4px solid var(--stone-light);
    }
    .mc-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* 結果彈窗 */
    #result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #result-overlay.show { display: flex; }

    /* Inventory / Chest 風格框 */
    #result-box {
      background: var(--stone-light);
      padding: 5px;
      border-top:    5px solid #fff;
      border-left:   5px solid #fff;
      border-bottom: 5px solid #555;
      border-right:  5px solid #555;
      min-width: 340px;
      animation: mc-pop 0.15s steps(3) forwards;
    }

    #result-box .inner {
      background: var(--stone);
      padding: 32px 40px;
      text-align: center;
      border-top:    4px solid var(--stone-dark);
      border-left:   4px solid var(--stone-dark);
      border-bottom: 4px solid var(--stone-light);
      border-right:  4px solid var(--stone-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    @keyframes mc-pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-label {
      font-size: 0.55rem;
      text-shadow: 2px 2px 0 #3f3f3f;
      letter-spacing: 2px;
    }

    .result-punishment {
      font-family: 'DotGothic16', monospace;
      font-size: 1.5rem;
      color: var(--gold);
      text-shadow: 2px 2px 0 #7f5c00;
      line-height: 1.6;
    }

    /* 經驗條 */
    .xp-wrap {
      width: 100%;
      height: 10px;
      background: #000;
      padding: 1px;
    }
    .xp-fill {
      height: 100%;
      background: var(--xp-green);
      width: 0%;
      animation: xp-anim 0.8s steps(10) forwards;
    }
    @keyframes xp-anim {
      from { width: 0%;   }
      to   { width: 100%; }
    }

    #close-btn { font-size: 0.7rem; padding: 10px 32px; min-width: 0; }
  </style>
</head>
<body>

  <div class="title-wrap">
    <h1>PUNISH WHEEL</h1>
    <div class="strip-grass"></div>
    <div class="strip-dirt"></div>
  </div>

  <div class="wheel-wrapper" id="wheel-wrapper">
    <div class="wheel-border"></div>
    <div class="pointer"></div>
    <canvas id="wheel" width="420" height="420"></canvas>
  </div>

  <button id="spin-btn" class="mc-btn">▶ SPIN</button>

  <div id="result-overlay">
    <div id="result-box">
      <div class="inner">
        <div class="result-label">*** YOUR PUNISHMENT ***</div>
        <div class="result-punishment" id="result-text"></div>
        <div class="xp-wrap"><div class="xp-fill" id="xp-fill"></div></div>
        <button id="close-btn" class="mc-btn">OK</button>
      </div>
    </div>
  </div>

  <script src="punishments.js"></script>
  <script>
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const size = canvas.width;
    const cx = size / 2;
    const cy = size / 2;
    const radius = cx - 6;

    let currentAngle = 0;
    let spinning = false;

    function drawWheel(angle) {
      const n = PUNISHMENTS.length;
      const arc = (2 * Math.PI) / n;

      ctx.clearRect(0, 0, size, size);

      PUNISHMENTS.forEach((item, i) => {
        const start = angle + i * arc;
        const end = start + arc;

        // 平色方塊填色（Minecraft 無漸層）
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = item.color;
        ctx.fill();

        // 分隔線
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.strokeStyle = "rgba(0,0,0,0.45)";
        ctx.lineWidth = 2;
        ctx.stroke();

        // 文字：DotGothic16 + Minecraft 硬陰影（無模糊）
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + arc / 2);
        ctx.textAlign = "right";
        ctx.shadowBlur = 0;
        const fontSize = Math.min(14, 240 / n);
        ctx.font = `${fontSize}px 'DotGothic16', monospace`;

        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillText(item.label, radius - 12 + 2, 5 + 2);

        ctx.fillStyle = "#ffffff";
        ctx.fillText(item.label, radius - 12, 5);
        ctx.restore();
      });

      // 中心石頭鈕
      ctx.beginPath();
      ctx.arc(cx, cy, 26, 0, 2 * Math.PI);
      ctx.fillStyle = "#555";
      ctx.fill();
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, 10, 0, 2 * Math.PI);
      ctx.fillStyle = "#C6C6C6";
      ctx.fill();
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      document.getElementById("spin-btn").disabled = true;

      const extraSpins = (6 + Math.floor(Math.random() * 6)) * 2 * Math.PI;
      const stopOffset = Math.random() * 2 * Math.PI;
      const targetAngle = currentAngle + extraSpins + stopOffset;
      const duration = 4000 + Math.random() * 1500;
      const startTime = performance.now();
      const startAngle = currentAngle;

      function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

      function animate(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
        drawWheel(currentAngle);

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          currentAngle = targetAngle % (2 * Math.PI);
          spinning = false;
          document.getElementById("spin-btn").disabled = false;
          showResult();
        }
      }

      requestAnimationFrame(animate);
    }

    function showResult() {
      const n = PUNISHMENTS.length;
      const arc = (2 * Math.PI) / n;
      const normalized = ((-Math.PI / 2 - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      const index = Math.floor(normalized / arc) % n;

      document.getElementById("result-text").textContent = PUNISHMENTS[index].label;

      // 重置經驗條動畫
      const xp = document.getElementById("xp-fill");
      xp.style.animation = "none";
      xp.offsetHeight;
      xp.style.animation = "";

      document.getElementById("result-overlay").classList.add("show");
    }

    document.getElementById("spin-btn").addEventListener("click", spin);
    document.getElementById("close-btn").addEventListener("click", () => {
      document.getElementById("result-overlay").classList.remove("show");
    });

    const wheelWrapper = document.getElementById("wheel-wrapper");
    wheelWrapper.addEventListener("click", spin);
    // document.getElementById("wheel-border").style.pointerEvents = "none";

    document.fonts.load("14px 'DotGothic16'")
      .catch(() => {})
      .then(() => drawWheel(0));
  </script>
</body>
</html>
