<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUNISH//WHEEL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cyan:    #00fff5;
      --magenta: #ff00a0;
      --yellow:  #ffe600;
      --green:   #00ff41;
      --bg:      #05050f;
      --panel:   #0a0a1e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Share Tech Mono', monospace;
      color: var(--cyan);
      gap: 28px;
      overflow: hidden;
    }

    /* 掃描線遮罩 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 245, 0.025) 2px,
        rgba(0, 255, 245, 0.025) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* 背景網格 */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,245,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,245,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow:
        0 0 8px var(--cyan),
        0 0 30px var(--cyan),
        0 0 60px rgba(0,255,245,0.4);
      z-index: 1;
      animation: flicker 6s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96%            { opacity: 0.6; }
      97%            { opacity: 1; }
      98%            { opacity: 0.3; }
      99%            { opacity: 1; }
    }

    .sub-title {
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: var(--magenta);
      text-shadow: 0 0 8px var(--magenta);
      z-index: 1;
      margin-top: -16px;
    }

    /* 轉盤外框 */
    .wheel-wrapper {
      position: relative;
      width: 420px;
      height: 420px;
      z-index: 1;
    }

    /* 外圈裝飾光環 */
    .wheel-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid var(--cyan);
      box-shadow:
        0 0 12px var(--cyan),
        0 0 30px rgba(0,255,245,0.3),
        inset 0 0 12px rgba(0,255,245,0.15);
      animation: ring-pulse 2s ease-in-out infinite;
    }

    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 12px var(--cyan), 0 0 30px rgba(0,255,245,0.3), inset 0 0 12px rgba(0,255,245,0.15); }
      50%       { box-shadow: 0 0 20px var(--cyan), 0 0 55px rgba(0,255,245,0.5), inset 0 0 20px rgba(0,255,245,0.25); }
    }

    canvas#wheel {
      border-radius: 50%;
      display: block;
    }

    /* 指針 — 頂部正中央 */
    .pointer {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 38px solid var(--magenta);
      filter:
        drop-shadow(0 0 6px var(--magenta))
        drop-shadow(0 0 18px var(--magenta));
      z-index: 2;
    }

    /* 轉動時讓外圈加速閃 */
    .spinning .wheel-ring {
      animation: ring-spin 0.4s linear infinite;
    }

    @keyframes ring-spin {
      0%   { box-shadow: 0 0 20px var(--cyan),    0 0 55px rgba(0,255,245,0.6), inset 0 0 20px rgba(0,255,245,0.3); }
      33%  { box-shadow: 0 0 20px var(--magenta), 0 0 55px rgba(255,0,160,0.6), inset 0 0 20px rgba(255,0,160,0.3); }
      66%  { box-shadow: 0 0 20px var(--yellow),  0 0 55px rgba(255,230,0,0.6), inset 0 0 20px rgba(255,230,0,0.3); }
      100% { box-shadow: 0 0 20px var(--cyan),    0 0 55px rgba(0,255,245,0.6), inset 0 0 20px rgba(0,255,245,0.3); }
    }

    #spin-btn {
      position: relative;
      z-index: 1;
      padding: 14px 56px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: transparent;
      color: var(--cyan);
      border: 2px solid var(--cyan);
      cursor: pointer;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      box-shadow:
        0 0 10px var(--cyan),
        inset 0 0 10px rgba(0,255,245,0.1);
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    #spin-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--cyan);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #spin-btn:hover::before { opacity: 0.12; }

    #spin-btn:hover {
      box-shadow:
        0 0 20px var(--cyan),
        0 0 50px rgba(0,255,245,0.4),
        inset 0 0 16px rgba(0,255,245,0.2);
    }

    #spin-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* 結果彈窗 */
    #result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #result-overlay.show { display: flex; }

    #result-box {
      background: var(--panel);
      border: 1px solid var(--magenta);
      padding: 48px 56px;
      text-align: center;
      position: relative;
      clip-path: polygon(18px 0%, 100% 0%, calc(100% - 18px) 100%, 0% 100%);
      box-shadow:
        0 0 30px var(--magenta),
        0 0 80px rgba(255,0,160,0.3),
        inset 0 0 20px rgba(255,0,160,0.08);
      animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* 角落裝飾線 */
    #result-box::before,
    #result-box::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
    }

    #result-box::before {
      top: 8px; left: 8px;
      border-top: 2px solid var(--cyan);
      border-left: 2px solid var(--cyan);
    }

    #result-box::after {
      bottom: 8px; right: 8px;
      border-bottom: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
    }

    @keyframes popIn {
      from { transform: scale(0.7) translateY(20px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);    opacity: 1; }
    }

    .result-label {
      font-size: 0.7rem;
      letter-spacing: 6px;
      color: var(--magenta);
      text-shadow: 0 0 8px var(--magenta);
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .result-punishment {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--yellow);
      text-shadow:
        0 0 8px var(--yellow),
        0 0 24px rgba(255,230,0,0.5);
      margin-bottom: 32px;
      line-height: 1.4;
    }

    #close-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 3px;
      padding: 10px 40px;
      background: var(--magenta);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-weight: 700;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      box-shadow: 0 0 16px var(--magenta), 0 0 40px rgba(255,0,160,0.4);
      transition: box-shadow 0.2s;
    }

    #close-btn:hover {
      box-shadow: 0 0 28px var(--magenta), 0 0 70px rgba(255,0,160,0.6);
    }

    /* 底部狀態列 */
    .status-bar {
      z-index: 1;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: rgba(0,255,245,0.4);
      display: flex;
      gap: 24px;
    }

    .status-bar span::before { content: "▶ "; }
  </style>
</head>
<body>
  <h1>PUNISH//WHEEL</h1>
  <p class="sub-title">// SPIN TO RECEIVE YOUR FATE //</p>

  <div class="wheel-wrapper" id="wheel-wrapper">
    <div class="wheel-ring"></div>
    <div class="pointer"></div>
    <canvas id="wheel" width="420" height="420"></canvas>
  </div>

  <button id="spin-btn">EXECUTE</button>

  <div class="status-bar">
    <span>SYS READY</span>
    <span id="status-seg">SEGMENTS: 0</span>
    <span>v1.0.0</span>
  </div>

  <div id="result-overlay">
    <div id="result-box">
      <div class="result-label">// PUNISHMENT ASSIGNED //</div>
      <div class="result-punishment" id="result-text"></div>
      <button id="close-btn">CONFIRM</button>
    </div>
  </div>

  <script src="punishments.js"></script>
  <script>
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const size = canvas.width;
    const cx = size / 2;
    const cy = size / 2;
    const radius = cx - 6;

    let currentAngle = 0;
    let spinning = false;

    document.getElementById("status-seg").textContent = `SEGMENTS: ${PUNISHMENTS.length}`;

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `${r},${g},${b}`;
    }

    function drawWheel(angle) {
      const n = PUNISHMENTS.length;
      const arc = (2 * Math.PI) / n;

      ctx.clearRect(0, 0, size, size);

      PUNISHMENTS.forEach((item, i) => {
        const start = angle + i * arc;
        const end = start + arc;
        const rgb = hexToRgb(item.color);

        // 扇形填色（深色底 + 靠外側漸層發光）
        const grad = ctx.createRadialGradient(cx, cy, 30, cx, cy, radius);
        grad.addColorStop(0, `rgba(${rgb},0.08)`);
        grad.addColorStop(0.7, `rgba(${rgb},0.25)`);
        grad.addColorStop(1, `rgba(${rgb},0.55)`);

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // 邊界線（霓虹色）
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.strokeStyle = item.color;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = item.color;
        ctx.shadowBlur = 8;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // 文字
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + arc / 2);
        ctx.textAlign = "right";
        ctx.font = `bold ${Math.min(15, 260 / n)}px 'Share Tech Mono', monospace`;
        ctx.fillStyle = "#ffffff";
        ctx.shadowColor = item.color;
        ctx.shadowBlur = 14;
        ctx.fillText(item.label, radius - 14, 5);
        // 描邊加強文字與背景的對比
        ctx.strokeStyle = "rgba(0,0,0,0.25)";
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";
        ctx.strokeText(item.label, radius - 14, 5);
        ctx.restore();
      });

      // 中心裝飾
      // 外圈
      ctx.beginPath();
      ctx.arc(cx, cy, 26, 0, 2 * Math.PI);
      ctx.fillStyle = "#05050f";
      ctx.fill();
      ctx.strokeStyle = "#00fff5";
      ctx.lineWidth = 2;
      ctx.shadowColor = "#00fff5";
      ctx.shadowBlur = 12;
      ctx.stroke();

      // 內點
      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
      ctx.fillStyle = "#00fff5";
      ctx.shadowColor = "#00fff5";
      ctx.shadowBlur = 16;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      document.getElementById("spin-btn").disabled = true;
      document.getElementById("wheel-wrapper").classList.add("spinning");

      const extraSpins = (6 + Math.floor(Math.random() * 6)) * 2 * Math.PI;
      const stopOffset = Math.random() * 2 * Math.PI;
      const targetAngle = currentAngle + extraSpins + stopOffset;

      const duration = 4000 + Math.random() * 1500;
      const startTime = performance.now();
      const startAngle = currentAngle;

      function easeOut(t) {
        return 1 - Math.pow(1 - t, 4);
      }

      function animate(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
        drawWheel(currentAngle);

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          currentAngle = targetAngle % (2 * Math.PI);
          spinning = false;
          document.getElementById("spin-btn").disabled = false;
          document.getElementById("wheel-wrapper").classList.remove("spinning");
          showResult();
        }
      }

      requestAnimationFrame(animate);
    }

    function showResult() {
      const n = PUNISHMENTS.length;
      const arc = (2 * Math.PI) / n;

      // 指針在正上方（canvas 角度 = -π/2）
      // 找到 currentAngle 偏移後，哪個 segment 覆蓋 -π/2
      const normalized = ((-Math.PI / 2 - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      const index = Math.floor(normalized / arc) % n;

      document.getElementById("result-text").textContent = PUNISHMENTS[index].label;
      document.getElementById("result-overlay").classList.add("show");
    }

    document.getElementById("spin-btn").addEventListener("click", spin);
    document.getElementById("close-btn").addEventListener("click", () => {
      document.getElementById("result-overlay").classList.remove("show");
    });

    drawWheel(0);
  </script>
</body>
</html>
